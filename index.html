<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Revisão - Carretas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>🚛 Revisão de Implementos (30 Dias)</h2>
    
    <div class="painel-resumo">
        <div class="card-resumo">
            <span class="titulo-card">Total de Carretas</span>
            <span id="totalVendas" class="valor-card">0</span>
        </div>
        <div class="card-resumo alerta">
            <span class="titulo-card">Revisões Vencidas</span>
            <span id="totalVencidas" class="valor-card">0</span>
        </div>
    </div>

    <div class="form-grupo">
        <input type="text" id="nomeCliente" placeholder="Nome do Cliente">
        <input type="text" id="placaCarreta" placeholder="Placa (Ex: ABC1D23)" style="text-transform: uppercase;">
        <input type="text" id="telCliente" placeholder="WhatsApp (DDD + Número)">
        <input type="date" id="dataVenda">
        <button class="btn-salvar" onclick="adicionarCliente()">Registrar Saída</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Placa</th>
                <th>WhatsApp</th>
                <th>Venda</th>
                <th>Revisão</th>
                <th>Status</th>
                <th>Aviso</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>
<div style="margin-bottom: 15px;">
    <input type="text" id="buscaPlaca" placeholder="🔍 Digite uma placa para buscar..." 
           onkeyup="filtrarTabela()" 
           style="width: 100%; padding: 12px; border: 2px solid #003366; border-radius: 8px; text-transform: uppercase;">
</div>
<table>
    <thead>
    <tr>
        <th>Cliente</th>

        <th>Venda</th>
        <th>Revisão</th>
        <th>Status</th> <th>Aviso</th>
        <th>Ação</th>
    </tr>
</thead>
    <tbody id="corpoTabela"></tbody>
</table>
</div>
