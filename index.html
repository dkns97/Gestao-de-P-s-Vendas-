<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Revisão - Carretas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Multieixo Sumaré - SP</h1>
    <h2>Sistema de Aviso de Revisão de Implementos </h2>
    
    <div class="painel-resumo">
        <div class="card-resumo">
            <span class="titulo-card">Total de Carretas</span>
            <span id="totalVendas" class="valor-card">0</span>
        </div>
        <div class="card-resumo alerta">
            <span class="titulo-card">Revisões Vencidas</span>
            <span id="totalVencidas" class="valor-card">0</span>
        </div>
    </div>

    <div class="form-grupo">
        <input type="text" id="nomeCliente" placeholder="Nome do Cliente">
        <input type="text" id="placaCarreta" placeholder="Placa (Ex: ABC1D23)" style="text-transform: uppercase;">
        <input type="text" id="telCliente" placeholder="WhatsApp (DDD + Número)">
        <input type="date" id="dataVenda">
        <button class="btn-salvar" onclick="adicionarCliente()">Registrar Saída</button>
    </div>

    <div class="container-busca">
        <input type="text" id="buscaPlaca" placeholder="🔍 Digite uma placa para buscar..." onkeyup="filtrarTabela()">
    </div>

    <div class="tabela-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">Cliente</th>
                    <th style="width: 10%;">Placa</th>
                    <th style="width: 12%;">WhatsApp</th>
                    <th style="width: 10%;">1ª Rev</th>
                    <th style="width: 10%;">2ª Rev</th>
                    <th style="width: 10%;">Status</th>
                    <th style="width: 23%;">Aviso</th>
                    <th style="width: 10%;">Ação</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAmsrR9ME2mW61m5M8d2pEzMQsjN0sxgbU",
        authDomain: "chat-privado-d00e2.firebaseapp.com",
        databaseURL: "https://chat-privado-d00e2-default-rtdb.firebaseio.com",
        projectId: "chat-privado-d00e2",
        storageBucket: "chat-privado-d00e2.firebasestorage.app",
        messagingSenderId: "952820411006",
        appId: "1:952820411006:web:22255435d5d00863bc862f",
        measurementId: "G-095T6T72C3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.fs = { collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, updateDoc };
</script>

<script src="script.js" type="module"></script>
    
</body>
</html>
